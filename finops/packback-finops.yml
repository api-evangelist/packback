description: >-
  FinOps view of Packback spend. Packback is an institutional / per-student
  educational SaaS, not a usage-metered developer API, so there is no per-token,
  per-request, or per-call API meter to instrument. Cost is driven by the
  commercial model - per-student course access and/or institutional site
  licensing - and is governed by procurement and contract management rather than
  cloud-style usage telemetry. This artifact is unreconciled because Packback
  does not publish public pricing or usage exports.
notes: >-
  Because there is no public developer API, classic API FinOps levers (batching,
  caching, model selection, token optimization) do not apply. The relevant cost
  levers are enrollment-based licensing, product-mix scoping, and contract
  negotiation. Verify figures with Packback sales during reconciliation.
