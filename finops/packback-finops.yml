meters:
- name: enrolled_students
  description: Students with access to Packback products in a course or term; primary driver of per-student licensing cost.
  unit: students
  aggregation: sum
  dimensions:
  - institution
  - course
  - term
  - product
- name: course_sections
  description: Course sections or communities provisioned via LTI; relevant to course-level packaging.
  unit: sections
  aggregation: sum
  dimensions:
  - institution
  - term
- name: institutional_license
  description: Flat institutional / site-license commitment negotiated by contract.
  unit: contract
  aggregation: max
  dimensions:
  - institution
  - year
principles:
- name: Visibility
  description: Track enrollment and active course communities per institution/term against the contracted license.
- name: Allocation
  description: Allocate per-student or site-license cost to departments, programs, or grant funding lines.
- name: Optimization
  description: Scope the product mix (Discussions vs. Writing vs. Deep Dives) and enrollment to actual usage; negotiate inclusive-access terms.
- name: Accountability
  description: Assign a program/department owner for the Packback contract and review utilization vs. spend each term.
